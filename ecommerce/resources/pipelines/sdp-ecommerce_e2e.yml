resources:
  pipelines:
    pipeline_sdp_ecommerce_e2e:
      name: sdp-ecommerce_e2e_${bundle.target}
      libraries:
        - glob:
            include: ../../src/**
      schema: bronze
      continuous: false
      development: false
      photon: true
      channel: CURRENT
      catalog: ecommerce_${var.catalog_env}
      serverless: true
      tags:
        etl: pipeline
        sdp: yes
      root_path: /Workspace/${bundle.target}/${bundle.name}
      configuration:
        catalog_env: ${var.catalog_env}
      # run_as:
      #       service_principal_name: ${var.prod_service_principal_name}