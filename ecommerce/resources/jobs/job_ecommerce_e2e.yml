# How this handles Skew and Spill
# By using these settings at the job cluster level, Spark performs a two-step optimization:

# Skew Handling: Before the join begins, Spark analyzes the partition sizes. If one key is massive (skewed), it splits that partition across multiple tasks to prevent one "straggler" worker from holding up the entire 15-minute window.

# Spill Mitigation: By setting a realistic advisoryPartitionSizeInBytes (like 128MB or 256MB), you ensure that partitions are small enough to fit into the executor's memory fraction. If they are too large, they spill to the local disk of the worker, which is significantly slower than RAM.


