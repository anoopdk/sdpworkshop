resources:
  jobs:
    job_ecommerce_e2e:
      name: job_ecommerce_e2e
      trigger:
        pause_status: UNPAUSED
        periodic:
          interval: 2
          unit: WEEKS
      tasks:
        - task_key: job_ecommerce_e2e
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_sdp_ecommerce_e2e.id}
            full_refresh: false
          # SAFETY 1: Hard Timeout
          # If the job hits 30 mins (2x the SLA), kill it immediately.
          timeout_seconds: 1800
          # SAFETY 2: Retries
          # Don't let a failing job restart 10 times and drain DBUs.
          max_retries: 1
      # SAFETY 3: Email Alerts
      email_notifications:
        on_failure: [ "anoop.kulkarni@example.com" ]
        on_duration_warning_threshold_exceeded: [ "anoop.kulkarni@example.com" ]
      # SAFETY 4: Threshold-Based Health Rules
      # Define the threshold for "More than usual"
      # If it usually takes 15m, alert at 20m.
      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 1200 # 20 minutes
      # SAFETY 5: Run As
      # In production, this job should run with a service principal that has just enough permissions.
      # run_as:
      #   service_principal_name: ${var.prod_service_principal_name}
      tags:
        domain: ecommerce
        region: london
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED

