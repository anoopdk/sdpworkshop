resources:
  jobs:
    job_ecommerce_e2e:
      name: job_ecommerce_e2e
      trigger:
        pause_status: UNPAUSED
        periodic:
          interval: 2
          unit: WEEKS
      tasks:
        - task_key: job_ecommerce_e2e
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_sdp_ecommerce_e2e.id}
            full_refresh: false
      tags:
        domain: ecommerce
        region: london
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED