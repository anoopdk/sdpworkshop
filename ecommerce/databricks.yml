# This is a Databricks asset bundle definition for ecommerce.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: ecommerce
  uuid: 9107caa2-3dbe-4c4a-9eba-25935861d2ad

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  catalog_env:
    description: "Catalog name to use for the project" 
    default: dev
# sync:
#   include:
#     - src/**/*.py

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: production
    default: true    
    presets:
      name_prefix: 'dev_${workspace.current_user.short_name}_'
      source_linked_deployment: false
    workspace:
      host: https://dbc-0f540a54-8135.cloud.databricks.com
      root_path: /Workspace/${bundle.target}/${bundle.name}
    variables:
      catalog_env: dev
    permissions:
      - user_name: anoopdk@gmail.com
        level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      host: https://dbc-0f540a54-8135.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/anoopdk@gmail.com to make sure we only have a single copy.
      # root_path: /Workspace/Users/anoopdk@gmail.com/.bundle/${bundle.name}/${bundle.target}
      root_path: /Workspace/${bundle.target}/${bundle.name}
    variables:
      catalog_env: prod
    permissions:
      - user_name: anoopdk@gmail.com
        level: CAN_MANAGE
